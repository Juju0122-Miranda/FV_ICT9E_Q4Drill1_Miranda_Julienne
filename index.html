<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Drill 1</title>

<style>

    body{
        background-image: url(https://i.pinimg.com/1200x/1d/f5/75/1df575bf070b027b18fc4e33ea283202.jpg);
        background-repeat: no-repeat;
        background-size: cover;
    }

    h1{
        background-color: (255, 255, 255.7);
        text-align: center;
        font-family: "Bungee", "sans-serif";
        font-size: 45px;
    }

    </style>
</head>
<body>
    <br>
     <h1>Electricity Usage Checker</h1> 

     <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100px;">
     <div class="col" style="width: 500px;">
     <div style="padding: 40px 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); border-radius: 15px; text-align: center;">
      
        <input type="text" id="consume" class="form-control" placeholder="type here">
        <button class="btn-btn-info" onclick="checkconsume()">Check</button>
     

     <script>
        function checkconsume(){ 
            var consume = document.getElementById("consume").value;
            var category1 = "Lifeline Consumer"; 
            var category2 = "Low consumption";
            var category3 = "Average Consumption";
            var category4 = "High Consumption";
            var category5 = "Very High Consumption";
        
        if(isNaN(consume)|| consume < 0 || consume ===""){
            alert("Please input a valid number");
        }

     else if (consume<= 100 ){ 
            alert(category1 + ": Discounted electricity rate");
        }

     else if(consume<=200 ){
            alert(category2 + "Normal residential rate");
         }

     else if(consume<=300 ){
            alert(category3 + "Typical electricity usage");
         }
         
    else if(consume<=500){
            alert(category4 + "Higher electricity usage");
         }

     else{ 
            alert(category5 + "Heavy electricity users");
        }
        }
    </script>

</body>
</html>
